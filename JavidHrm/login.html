              id="grid-pattern-1a4MN34vH0:0"

    <!-- Content -->
    <main class="sm:container">
      <div
        class="bg-card text-card-foreground relative mx-auto rounded-xl border max-sm:flex max-sm:min-h-screen max-sm:min-w-screen max-sm:items-center max-sm:justify-center max-sm:overflow-y-auto sm:h-auto sm:max-w-96"
      >
        <div class="relative w-full">
          <div
            class="flex flex-col items-center justify-center gap-1 px-4 py-6"
          >
            <div
              class="bg-secondary mb-3 flex size-14 items-center justify-center rounded-full"
            >
              <span class="icon-[lucide--user] size-7"></span>
            </div>

            <h1 class="text-card-foreground text-lg font-semibold">
              ورود به پنل ادمین
            </h1>
            <p class="text-center text-neutral-500">
              خوش آمدید. لطفا اطلاعات زیر را پر کنید
            </p>
          </div>
          <form>
            <div class="space-y-4 px-6 pb-6">
              <div class="space-y-2">
                <label for="username" class="sr-only">
                  شماره موبایل و یا ایمیل
                </label>
                <input
                  id="username"
                  dir="ltr"
                  class="input placeholder:text-right"
                  placeholder="شماره موبایل یا ایمیل"
                />
                <p class="text-warning h-5 text-sm">
                  مقدار وارد شده نا معتبر است
                </p>
              </div>
              <div class="space-y-2">
                <label for="password" class="sr-only"> کلمه عبور </label>
                <input
                  id="password"
                  type="password"
                  dir="ltr"
                  class="input placeholder:text-right"
                  placeholder="کلمه عبور"
                />
                <p class="text-warning h-5 text-sm">کلمه عبور اشتباه است</p>
              </div>
            </div>
            <div class="border-t p-6">
              <button
                type="submit"
                class="button w-full"
                variant="primary"
                size="default"
              >
                ورود
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
