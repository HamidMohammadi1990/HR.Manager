<!doctype html>
<html lang="fa-IR" class="dark" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حالت تعمیر | پنل مدیریت</title>
    <link rel="stylesheet" href="./assets/styles/app.css" />
    <link rel="stylesheet" href="./assets/styles/themes.css" />
    <script src="./assets/scripts/mount.js"></script>
  </head>

  <body
    class="from-primary/5 via-background to-accent/5 flex min-h-screen items-center justify-center bg-gradient-to-br p-4"
  >
    <div class="w-full max-w-xl text-center">
      <!-- Maintenance Illustration -->
      <div class="relative mb-8">
        <div class="text-primary/10 text-[120px] leading-none font-black">
          🔧
        </div>
        <div class="absolute inset-0 flex items-center justify-center">
          <div
            class="from-primary to-accent flex size-20 items-center justify-center rounded-full bg-gradient-to-br shadow-lg"
          >
            <span
              class="icon-[material-symbols--construction] text-primary-foreground size-10"
            ></span>
          </div>
        </div>
      </div>

      <div class="mb-6 space-y-3">
        <h1 class="text-foreground text-2xl font-bold">حالت تعمیر و نگهداری</h1>
        <p class="text-muted-foreground mx-auto max-w-sm text-sm">
          سیستم در حال به‌روزرسانی است. به زودی به خدمات عادی باز خواهیم گشت.
        </p>
      </div>

      <!-- Maintenance Info -->
      <div class="bg-muted/30 mx-auto mb-6 max-w-sm rounded-lg p-4">
        <div class="mb-2 flex items-start gap-2">
          <span
            class="icon-[material-symbols--info] text-primary mt-0.5 size-4"
          ></span>
          <div class="text-start text-xs">
            <p class="mb-1 font-medium">چه کاری انجام می‌دهیم:</p>
            <ul class="text-muted-foreground space-y-0.5">
              <li>• بهبود عملکرد سیستم</li>
              <li>• اعمال به‌روزرسانی‌های امنیتی</li>
              <li>• تعمیر و نگهداری برنامه‌ریزی شده</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="mb-6 flex flex-col justify-center gap-2 sm:flex-row">
        <button
          onclick="location.reload()"
          class="from-primary to-accent text-primary-foreground flex items-center gap-2 rounded-lg bg-gradient-to-r px-4 py-2 font-medium transition-all duration-300 hover:shadow-md"
        >
          <span class="icon-[material-symbols--refresh] size-4"></span>
          بررسی مجدد
        </button>
        <a
          href="mailto:support@example.com"
          class="bg-card text-card-foreground hover:border-primary flex items-center gap-2 rounded-lg border px-4 py-2 font-medium transition-all duration-300 hover:shadow-md"
        >
          <span class="icon-[material-symbols--mail] size-4"></span>
          تماس با پشتیبانی
        </a>
        <a
          href="help.html"
          class="bg-card text-card-foreground hover:border-primary flex items-center gap-2 rounded-lg border px-4 py-2 font-medium transition-all duration-300 hover:shadow-md"
        >
          <span class="icon-[material-symbols--help] size-4"></span>
          راهنما
        </a>
      </div>

      <p class="text-muted-foreground text-xs">
        برای اطلاعات بیشتر با تیم پشتیبانی تماس بگیرید.
      </p>
    </div>
  </body>
</html>
