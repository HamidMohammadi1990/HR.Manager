<!doctype html>
<html lang="fa-IR" class="light" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تغییر رمز عبور | پنل مدیریت</title>
    <link rel="stylesheet" href="./assets/styles/app.css" />
    <link rel="stylesheet" href="./assets/styles/themes.css" />
    <script src="./assets/scripts/mount.js"></script>
  </head>

  <body class="bg-background flex min-h-screen items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="card">
        <div class="card-content p-8">
          <!-- Lock Icon with Animation -->
          <div class="relative mx-auto mb-6 size-20">
            <div
              class="bg-primary/10 absolute inset-0 animate-ping rounded-full"
            ></div>
            <div
              class="from-primary relative flex size-20 items-center justify-center rounded-full bg-gradient-to-br to-violet-600"
            >
              <span
                class="icon-[material-symbols--lock-open] size-10 text-white"
              ></span>
            </div>
          </div>

          <div class="mb-8 text-center">
            <h1 class="mb-2 text-2xl font-bold">تعیین رمز عبور جدید</h1>
            <p class="text-muted-foreground text-sm">
              رمز عبور قوی انتخاب کنید که قبلاً استفاده نکرده‌اید
            </p>
          </div>

          <form class="space-y-6">
            <div class="space-y-2">
              <label for="new-password" class="label">رمز عبور جدید</label>
              <input
                id="new-password"
                type="password"
                class="input"
                placeholder="حداقل ۸ کاراکتر"
                dir="ltr"
              />
              <!-- Password Strength -->
              <div class="mt-2 flex gap-1">
                <div class="bg-muted h-1 flex-1 rounded-full"></div>
                <div class="bg-muted h-1 flex-1 rounded-full"></div>
                <div class="bg-muted h-1 flex-1 rounded-full"></div>
                <div class="bg-muted h-1 flex-1 rounded-full"></div>
              </div>
              <p class="text-muted-foreground text-xs">قدرت رمز: متوسط</p>
            </div>

            <div class="space-y-2">
              <label for="confirm-password" class="label">تکرار رمز عبور</label>
              <input
                id="confirm-password"
                type="password"
                class="input"
                placeholder="رمز عبور را مجدداً وارد کنید"
                dir="ltr"
              />
            </div>

            <!-- Requirements -->
            <div class="bg-muted/20 space-y-2 rounded-xl border p-4">
              <p class="mb-3 text-sm font-medium">
                رمز عبور باید شامل موارد زیر باشد:
              </p>
              <div class="flex items-center gap-2 text-sm">
                <span
                  class="icon-[material-symbols--check-circle] text-muted-foreground size-4"
                ></span>
                <span class="text-muted-foreground">حداقل ۸ کاراکتر</span>
              </div>
              <div class="flex items-center gap-2 text-sm">
                <span
                  class="icon-[material-symbols--check-circle] size-4 text-emerald-600"
                ></span>
                <span>یک حرف بزرگ و کوچک</span>
              </div>
              <div class="flex items-center gap-2 text-sm">
                <span
                  class="icon-[material-symbols--check-circle] text-muted-foreground size-4"
                ></span>
                <span class="text-muted-foreground">یک عدد</span>
              </div>
              <div class="flex items-center gap-2 text-sm">
                <span
                  class="icon-[material-symbols--check-circle] text-muted-foreground size-4"
                ></span>
                <span class="text-muted-foreground">یک کاراکتر خاص</span>
              </div>
            </div>

            <button type="submit" class="button w-full" variant="default">
              <span class="icon-[material-symbols--check] size-5"></span>
              تغییر رمز عبور
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
