    <!-- Content -->

      <div

            <div class="px-6 pb-6">

                  dir="ltr"
                  id="otp-wrapper"
                >

                    maxlength="1"
                    inputmode="numeric"
                    class="data-filled:border-border-light focus:border-border-light input size-14 rounded-lg text-center text-lg duration-200 sm:size-14"

                    data-otp-input-restore="2"
                  />
                  <input
                    type="number"
                    maxlength="1"
                    inputmode="numeric"
                    class="data-filled:border-border-light focus:border-border-light input size-14 rounded-lg text-center text-lg duration-200 sm:size-14"
                    data-filled="true"
                    data-otp-input-restore="1"
                  />
                  <input
                    type="number"
                    maxlength="1"
                    inputmode="numeric"
                    class="data-filled:border-border-light focus:border-border-light input size-14 rounded-lg text-center text-lg duration-200 sm:size-14"
                  />
                  <input
                    type="number"
                    maxlength="1"
                    inputmode="numeric"
                    class="data-filled:border-border-light focus:border-border-light input size-14 rounded-lg text-center text-lg duration-200 sm:size-14"
                  />
                </div>
                <p class="text-warning h-5 text-sm">کد تایید اشتباه میباشد</p>
              </div>
            </div>
            <!-- Actions -->
            <ul class="mb-6 space-y-3 px-6 text-sm">
              <li>
                <p
                  class="text-muted-foreground text-sm select-none"
                  id="countdownSection"
                >
                  زمان باقی‌مانده تا ارسال مجدد
                  <span id="countdown" class="font-bold">1:52</span>
                </p>
                <button
                  id="resendButton"
                  type="button"
                  disabled=""
                  class="link hidden"
                  onclick="resendOTP()"
                >
                  ارسال مجدد کد تایید

                  <span class="icon-[lucide--chevron-left] size-4.5"></span>
                </button>
              </li>
              <li>
                <a href="./login.html" class="link">
                  ورود با کلمه عبور
                  <span class="icon-[lucide--chevron-left] size-4.5"></span>
                </a>
              </li>
            </ul>
            <div class="border-t p-6">
              <button
                type="button"
                class="button w-full"
                variant="primary"
                size="default"
                onclick="Submit()"
              >
                تایید
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>

  <script>
    // Initial OTP Input Functionality
    const OTPInput = new WebOTP("#otp-wrapper", Submit);

    function Submit(value) {
      const otpValue = value || OTPInput.getValue();
      if (otpValue) alert(otpValue);
    }

    // Resend Section
    const { startTimer, isPending, resetTimer } = createCountdownTimer({
      initialSeconds: 120, // 2 minutes
      countdownWrapperId: "countdownSection",
      countdownTimerElementId: "countdown",
      elementToShowId: "resendButton",
    });
    // Start the countdown when the page loads
    startTimer();

    function resendOTP() {
      if (isPending()) return;
      // Make request for new OTP

      // After finish
      resetTimer();
    }
  </script>
